<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="A spring themed album by Matt Krupa.">
        <meta property="og:image" content="https://mattkrupa.net/static/images/lightofspring.jpg">
        <meta property="og:type" content="website" />
        <title>Light of Spring</title>
        <link rel="icon" type="image/x-icon" href="../favicon.ico">
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
        <link href="../css/styles.css" rel="stylesheet">
    </head>
    <body id="page-top">

        <!-- Navigation -->
        <div id="navbar-container"></div>

        <!-- Header -->
        <header class="spring masthead">
            <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
                <div class="d-flex justify-content-center">
                    <div class="text-center">
                        <h1 class="mx-auto my-0 text-uppercase">Light of Spring</h1>
                        <h2 class="text-white-50 mx-auto mt-2 mb-5">Journey coming to an end</h2>
                    </div>
                </div>
            </div>
        </header>

        <!-- Album Description -->
        <section class="projects-section bg-black text-white text-left" id="about">
            <div class="container px-4 px-lg-5">
                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <h2 class="text-white mb-4">The album is about everyday life, about the miracle of new life, about work, about train rides, about trust, about the plot of land...</h2>
                        <p class="text-white-50">
                            coming soon
                        </p>
                        <p class="text-white-50">
                            tommorow
                        </p>
                        <p class="text-white-50">
                            coma babe
                        </p>
                    </div>
                    <div class="col-lg-6">
                        <iframe style="border: 0; width: 350px; height: 720px;" src="about:blank"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <!-- Social Links -->
        <div id="social-container"></div>

        <!-- Footer -->
        <div id="footer-container"></div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Custom JS -->
        <script src="../js/scripts.js"></script>
    </body>
</html>
